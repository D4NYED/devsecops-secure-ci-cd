name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -v
      
      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r app -ll    
       
      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep --config=p/owasp-top-ten app/

      - name: Build Docker image
        run: |
          docker build -t devsecops-secure-ci-cd:latest .
      
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-secure-ci-cd:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: List Docker images
        run: docker images      
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: devsecops-secure-ci-cd:latest
          format: cyclonedx-json
          output-file: sbom.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.json
        